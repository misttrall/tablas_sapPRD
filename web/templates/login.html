<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | SAP Extraction</title>
    <style>
        body { margin:0; font-family:'Segoe UI',sans-serif; background:#F1F5F9; color:#0F172A; }
        .centered { display:flex; align-items:center; justify-content:center; height:100vh; }
        .card { background:white; padding:40px; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,0.08); width:380px; text-align:center; }
        h1 { margin-bottom:20px; }
        .badge { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
        .qa { background:#F59E0B; color:white; }
        .form-group { margin-bottom:20px; text-align:left; }
        label { font-size:14px; font-weight:500; display:block; margin-bottom:6px; }
        input { width:100%; padding:10px; border-radius:8px; border:1px solid #CBD5E1; font-size:14px; transition:border 0.2s, box-shadow 0.2s; }
        input:focus { outline:none; border-color:#2563EB; box-shadow:0 0 0 3px rgba(37,99,235,0.2); }
        .btn-primary { width:100%; padding:12px; border:none; border-radius:10px; background:#2563EB; color:white; font-weight:600; cursor:pointer; transition:all 0.2s ease; }
        .btn-primary:hover { background:#1D4ED8; transform:translateY(-2px); }
        .error { color:red; font-weight:500; margin-top:10px; }
    </style>
</head>
<body class="centered">

    <div class="card login-card">
        <h1>SAP Extraction</h1>
        <span class="badge qa">PRD Environment</span>

        <form method="POST">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" required>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit" class="btn-primary">Iniciar Sesión</button>

            {% if error %}
            <p class="error">{{ error }}</p>
            {% endif %}
        </form>
    </div>

</body>
</html>
